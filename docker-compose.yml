# One-command deploy:  cp .env.example .env  (fill it)  then:  docker compose up -d --build
# To let n8n reach it by name, put both on the same external network (see the commented block).
services:
  docgen:
    build: .
    container_name: im-docgen
    env_file: .env
    ports:
      - "8088:8088"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8088/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
# networks:
#   default:
#     external: true
#     name: <your-n8n-docker-network>   # then n8n can call http://im-docgen:8088
